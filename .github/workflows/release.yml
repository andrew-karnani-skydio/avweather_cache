name: Release Native Binaries

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Native Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -ldflags '-w -s' -o avweather_cache-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Generate checksum
        run: |
          sha256sum avweather_cache-${{ matrix.goos }}-${{ matrix.goarch }} > avweather_cache-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            avweather_cache-${{ matrix.goos }}-${{ matrix.goarch }}
            avweather_cache-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p ./release
          find ./artifacts -type f -exec mv {} ./release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/*
          generate_release_notes: true
          draft: false
          prerelease: false
