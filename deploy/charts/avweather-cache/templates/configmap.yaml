apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "avweather-cache.fullname" . }}
  labels:
    {{- include "avweather-cache.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      port: {{ .Values.config.server.port }}
    cache:
      update_interval: {{ .Values.config.cache.updateInterval | quote }}
      source_url: {{ .Values.config.cache.sourceUrl | quote }}
